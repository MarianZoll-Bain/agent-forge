<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="brand-s" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="shadow-s" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <clipPath id="round-s"><rect width="960" height="600" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#round-s)">
    <!-- Background -->
    <rect width="960" height="600" fill="#09090b"/>
    <circle cx="880" cy="60" r="260" fill="#6366f1" opacity="0.05"/>

    <!-- Header bar -->
    <rect width="960" height="52" fill="#09090b" opacity="0.9"/>
    <line x1="0" y1="52" x2="960" y2="52" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="20" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="800" fill="url(#brand-s)">AgentForge</text>
    <text x="20" y="43" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#52525b" letter-spacing="1.2">WORKTREE ORCHESTRATOR</text>

    <!-- Dimmed backdrop -->
    <rect x="0" y="52" width="960" height="548" fill="#000000" opacity="0.4"/>

    <!-- Settings sidebar -->
    <rect x="640" y="0" width="320" height="600" fill="#18181b" filter="url(#shadow-s)"/>
    <rect x="640" y="0" width="320" height="600" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Settings header -->
    <text x="668" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#fafafa">Settings</text>
    <text x="932" y="32" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#71717a" text-anchor="end">&#x2715;</text>
    <line x1="640" y1="52" x2="960" y2="52" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Appearance section -->
    <text x="668" y="84" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#71717a" letter-spacing="1.2">APPEARANCE</text>
    <!-- Toggle bar: Light / System / Dark -->
    <rect x="668" y="96" width="264" height="32" rx="10" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="712" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a" text-anchor="middle">Light</text>
    <text x="800" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#71717a" text-anchor="middle">System</text>
    <!-- Active: Dark -->
    <rect x="844" y="98" width="84" height="28" rx="8" fill="#6366f1"/>
    <text x="886" y="116" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Dark</text>

    <!-- Tools section -->
    <text x="668" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#71717a" letter-spacing="1.2">TOOLS</text>

    <!-- Cursor toggle — ON -->
    <rect x="668" y="174" width="36" height="20" rx="10" fill="#6366f1"/>
    <circle cx="690" cy="184" r="7" fill="#ffffff"/>
    <text x="714" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e4e4e7">Cursor</text>
    <!-- Check + version -->
    <text x="830" y="188" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#34d399">&#x2713;</text>
    <text x="842" y="188" font-family="ui-monospace,monospace" font-size="9" font-weight="500" fill="#34d399">0.48.1</text>

    <!-- Claude CLI toggle — ON -->
    <rect x="668" y="202" width="36" height="20" rx="10" fill="#6366f1"/>
    <circle cx="690" cy="212" r="7" fill="#ffffff"/>
    <text x="714" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e4e4e7">Claude CLI</text>
    <text x="830" y="216" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#34d399">&#x2713;</text>
    <text x="842" y="216" font-family="ui-monospace,monospace" font-size="9" font-weight="500" fill="#34d399">1.0.17</text>

    <!-- Ollama toggle — OFF -->
    <rect x="668" y="230" width="36" height="20" rx="10" fill="#3f3f46"/>
    <circle cx="682" cy="240" r="7" fill="#ffffff"/>
    <text x="714" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a1a1aa">Claude + Ollama</text>

    <!-- Divider -->
    <line x1="668" y1="260" x2="932" y2="260" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Git Mode toggle — ON -->
    <rect x="668" y="270" width="36" height="20" rx="10" fill="#6366f1"/>
    <circle cx="690" cy="280" r="7" fill="#ffffff"/>
    <text x="714" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e4e4e7">Git Mode (GitHub CLI)</text>
    <text x="898" y="284" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#34d399">&#x2713;</text>
    <text x="910" y="284" font-family="ui-monospace,monospace" font-size="9" font-weight="500" fill="#34d399">2.67</text>

    <!-- General section -->
    <text x="668" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#71717a" letter-spacing="1.2">GENERAL</text>

    <!-- Base branch input -->
    <text x="668" y="342" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#a1a1aa">Default base branch</text>
    <rect x="668" y="348" width="264" height="30" rx="8" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="680" y="368" font-family="ui-monospace,monospace" font-size="11" fill="#e4e4e7">main</text>

    <!-- Worktrees dir input -->
    <text x="668" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#a1a1aa">Worktrees directory</text>
    <rect x="668" y="406" width="264" height="30" rx="8" fill="#ffffff" opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="680" y="426" font-family="ui-monospace,monospace" font-size="11" fill="#e4e4e7">.worktrees</text>

    <!-- Danger zone -->
    <text x="668" y="470" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#ef4444" letter-spacing="1.2">DANGER ZONE</text>
    <rect x="668" y="482" width="264" height="30" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="680" y="502" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#a1a1aa">Run Setup Wizard</text>
    <rect x="668" y="518" width="264" height="30" rx="8" fill="none" stroke="#ef4444" stroke-opacity="0.2"/>
    <text x="680" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ef4444">Reset App</text>

    <!-- Footer buttons -->
    <line x1="640" y1="556" x2="960" y2="556" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="836" y="568" width="56" height="26" rx="8" fill="#6366f1"/>
    <text x="852" y="585" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Save</text>
    <rect x="772" y="568" width="56" height="26" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="782" y="585" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="500" fill="#a1a1aa">Cancel</text>
  </g>
</svg>
