<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.06"/>
    </filter>
    <clipPath id="round"><rect width="960" height="600" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="960" height="600" fill="#f8fafc"/>

    <!-- Decorative orb -->
    <circle cx="880" cy="60" r="240" fill="#818cf8" opacity="0.06"/>

    <!-- Header bar -->
    <rect width="960" height="52" fill="#ffffff" opacity="0.85"/>
    <line x1="0" y1="52" x2="960" y2="52" stroke="#e2e8f0" stroke-opacity="0.6"/>
    <!-- Brand -->
    <text x="20" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="800" fill="url(#brand)">AgentForge</text>
    <text x="20" y="43" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1.2">WORKTREE ORCHESTRATOR</text>
    <!-- Header buttons -->
    <rect x="770" y="14" width="70" height="26" rx="6" fill="transparent"/>
    <text x="790" y="31" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#64748b">Prompts</text>
    <rect x="850" y="14" width="70" height="26" rx="6" fill="transparent"/>
    <text x="866" y="31" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#64748b">Settings</text>

    <!-- Project bar -->
    <rect x="16" y="64" width="928" height="44" rx="12" fill="#ffffff" opacity="0.8" filter="url(#shadow-sm)"/>
    <rect x="16" y="64" width="928" height="44" rx="12" fill="none" stroke="#e2e8f0" stroke-opacity="0.6"/>
    <!-- Folder icon box -->
    <rect x="30" y="73" width="26" height="26" rx="7" fill="#e0e7ff"/>
    <path d="M37 82v8a1.5 1.5 0 001.5 1.5h10a1.5 1.5 0 001.5-1.5v-6a1.5 1.5 0 00-1.5-1.5h-4.5l-1.5-1.5h-4A1.5 1.5 0 0037 82z" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <!-- Project label -->
    <text x="64" y="81" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#94a3b8" letter-spacing="1">PROJECT</text>
    <text x="64" y="97" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">my-saas-app</text>
    <!-- Switch button -->
    <text x="896" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#4f46e5" text-anchor="end">Switch</text>

    <!-- Board header -->
    <text x="24" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Worktrees</text>
    <rect x="92" y="128" width="20" height="18" rx="6" fill="#e2e8f0"/>
    <text x="102" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">3</text>

    <!-- Add worktree button -->
    <rect x="838" y="124" width="106" height="32" rx="10" fill="url(#cta)" filter="url(#shadow-sm)"/>
    <text x="860" y="144" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ffffff">+ Add worktree</text>

    <!-- Agent Card 1 -->
    <rect x="20" y="166" width="296" height="210" rx="16" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="20" y="166" width="296" height="210" rx="16" fill="none" stroke="#e2e8f0" stroke-opacity="0.8"/>
    <text x="40" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#0f172a">auth-refactor</text>
    <text x="40" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">feature/auth-refactor</text>
    <text x="40" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#64748b">feature/auth-refactor</text>
    <text x="200" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">a3f21b4</text>
    <!-- Clean badge -->
    <rect x="260" y="226" width="42" height="18" rx="9" fill="#ecfdf5"/>
    <text x="270" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#15803d" letter-spacing="0.5">CLEAN</text>
    <!-- Path -->
    <text x="40" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">.worktrees/auth-refactor</text>
    <!-- Tool buttons -->
    <rect x="40" y="330" width="60" height="28" rx="8" fill="#ede9fe" stroke="#ddd6fe" stroke-opacity="0.8"/>
    <text x="55" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Cursor</text>
    <rect x="108" y="330" width="80" height="28" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-opacity="0.8"/>
    <text x="121" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#c2410c">Claude CLI</text>

    <!-- Agent Card 2 -->
    <rect x="332" y="166" width="296" height="210" rx="16" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="332" y="166" width="296" height="210" rx="16" fill="none" stroke="#e2e8f0" stroke-opacity="0.8"/>
    <text x="352" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#0f172a">payment-flow</text>
    <text x="352" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">feature/payment-flow</text>
    <text x="352" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#64748b">feature/payment-flow</text>
    <text x="512" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">e7c09f2</text>
    <!-- Dirty badge -->
    <rect x="572" y="226" width="40" height="18" rx="9" fill="#fffbeb"/>
    <text x="580" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#a16207" letter-spacing="0.5">DIRTY</text>
    <!-- Ahead indicator -->
    <text x="572" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#94a3b8">2&#x2191;</text>
    <!-- Path -->
    <text x="352" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">.worktrees/payment-flow</text>
    <!-- Tool buttons -->
    <rect x="352" y="330" width="60" height="28" rx="8" fill="#ede9fe" stroke="#ddd6fe" stroke-opacity="0.8"/>
    <text x="367" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Cursor</text>
    <rect x="420" y="330" width="80" height="28" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-opacity="0.8"/>
    <text x="433" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#c2410c">Claude CLI</text>

    <!-- Agent Card 3 -->
    <rect x="644" y="166" width="296" height="210" rx="16" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="644" y="166" width="296" height="210" rx="16" fill="none" stroke="#e2e8f0" stroke-opacity="0.8"/>
    <text x="664" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#0f172a">api-tests</text>
    <text x="664" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">feature/api-tests</text>
    <text x="664" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#64748b">feature/api-tests</text>
    <text x="804" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">1b5de8a</text>
    <!-- Clean badge -->
    <rect x="880" y="226" width="42" height="18" rx="9" fill="#ecfdf5"/>
    <text x="890" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#15803d" letter-spacing="0.5">CLEAN</text>
    <!-- Path -->
    <text x="664" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#94a3b8">.worktrees/api-tests</text>
    <!-- Tool buttons -->
    <rect x="664" y="330" width="60" height="28" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-opacity="0.8"/>
    <text x="674" y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a16207">Ollama</text>
  </g>
</svg>
