    <text x="270" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#34d399" letter-spacing="0.5">CLEAN</text>
    <!-- Path -->
    <text x="40" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#52525b">.worktrees/auth-refactor</text>
    <!-- PR status: Open -->
    <rect x="40" y="278" width="96" height="20" rx="10" fill="#10b981" opacity="0.12"/>
    <text x="52" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#34d399">PR #12 &#183; Open</text>
    <text x="146" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#818cf8">Open PR</text>
    <!-- Refresh icon -->
    <circle cx="296" cy="288" r="8" fill="#ffffff" opacity="0.04"/>
    <!-- Tool buttons -->
    <rect x="40" y="350" width="60" height="28" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.2"/>
    <text x="50" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Cursor</text>
    <rect x="108" y="350" width="80" height="28" rx="8" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-opacity="0.2"/>
    <text x="118" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fdba74">Claude CLI</text>

    <!-- Agent Card 2 — payment-flow, PR Draft -->
    <rect x="332" y="166" width="296" height="230" rx="16" fill="#ffffff" opacity="0.03" filter="url(#shadow-d)"/>
    <rect x="332" y="166" width="296" height="230" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="352" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fafafa">payment-flow</text>
    <text x="352" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">feature/payment-flow</text>
    <text x="352" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#a1a1aa">feature/payment-flow</text>
    <text x="512" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">e7c09f2</text>
