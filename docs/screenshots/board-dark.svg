    <rect x="572" y="226" width="40" height="18" rx="9" fill="#f59e0b" opacity="0.12"/>
    <text x="580" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#fbbf24" letter-spacing="0.5">DIRTY</text>
    <!-- Ahead indicator -->
    <text x="572" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#71717a">2&#x2191;</text>
    <!-- Path -->
    <text x="352" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#52525b">.worktrees/payment-flow</text>
    <!-- PR status: Draft -->
    <rect x="352" y="278" width="96" height="20" rx="10" fill="#ffffff" opacity="0.06"/>
    <text x="364" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#a1a1aa">PR #15 &#183; Draft</text>
    <text x="458" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#818cf8">Open PR</text>
    <!-- Tool buttons -->
    <rect x="352" y="350" width="60" height="28" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.2"/>
    <text x="362" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Cursor</text>
    <rect x="420" y="350" width="80" height="28" rx="8" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-opacity="0.2"/>
    <text x="430" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fdba74">Claude CLI</text>

    <!-- Agent Card 3 — api-tests, PR Merged -->
    <rect x="644" y="166" width="296" height="230" rx="16" fill="#ffffff" opacity="0.03" filter="url(#shadow-d)"/>
    <rect x="644" y="166" width="296" height="230" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="664" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fafafa">api-tests</text>
    <text x="664" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">feature/api-tests</text>
    <text x="664" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#a1a1aa">feature/api-tests</text>
    <text x="804" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">1b5de8a</text>
    <!-- Clean badge -->
    <rect x="880" y="226" width="42" height="18" rx="9" fill="#10b981" opacity="0.12"/>
    <text x="890" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#34d399" letter-spacing="0.5">CLEAN</text>
    <!-- Path -->
    <text x="664" y="262" font-family="ui-monospace,monospace" font-size="10" fill="#52525b">.worktrees/api-tests</text>
    <!-- PR status: Merged -->
    <rect x="664" y="278" width="108" height="20" rx="10" fill="#8b5cf6" opacity="0.12"/>
    <text x="676" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="700" fill="#c4b5fd">PR #8 &#183; Merged</text>
    <text x="782" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#818cf8">Open PR</text>
    <!-- Tool buttons -->
    <rect x="664" y="350" width="60" height="28" rx="8" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="674" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fcd34d">Ollama</text>
  </g>
</svg>
