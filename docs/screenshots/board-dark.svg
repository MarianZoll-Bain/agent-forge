    <rect x="20" y="166" width="296" height="230" rx="16" fill="#ffffff" opacity="0.03" filter="url(#shadow-d)"/>
    <rect x="20" y="166" width="296" height="230" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="40" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#fafafa">auth-refactor</text>
    <text x="40" y="214" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">feature/auth-refactor</text>
    <text x="40" y="238" font-family="ui-monospace,monospace" font-size="11" font-weight="500" fill="#a1a1aa">feature/auth-refactor</text>
    <text x="200" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#52525b">a3f21b4</text>
    <!-- Clean badge -->
