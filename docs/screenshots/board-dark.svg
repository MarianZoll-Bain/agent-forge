<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none">
  <defs>
    <linearGradient id="brand-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="cta-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow-d" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow-sm-d" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <clipPath id="round-d"><rect width="960" height="600" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#round-d)">
    <!-- Background -->
    <rect width="960" height="600" fill="#09090b"/>

    <!-- Decorative orb -->
    <circle cx="880" cy="60" r="260" fill="#6366f1" opacity="0.05"/>
    <circle cx="80" cy="540" r="200" fill="#8b5cf6" opacity="0.03"/>

    <!-- Header bar -->
    <rect width="960" height="52" fill="#09090b" opacity="0.9"/>
    <line x1="0" y1="52" x2="960" y2="52" stroke="#ffffff" stroke-opacity="0.06"/>
    <!-- Brand -->
    <text x="20" y="30" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="800" fill="url(#brand-d)">AgentForge</text>
    <text x="20" y="43" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#52525b" letter-spacing="1.2">WORKTREE ORCHESTRATOR</text>
    <!-- Header buttons -->
    <text x="790" y="31" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#a1a1aa">Prompts</text>
    <text x="866" y="31" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500" fill="#a1a1aa">Settings</text>

    <!-- Project bar -->
    <rect x="16" y="64" width="928" height="44" rx="12" fill="#ffffff" opacity="0.03" filter="url(#shadow-sm-d)"/>
    <rect x="16" y="64" width="928" height="44" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <!-- Folder icon box -->
    <rect x="30" y="73" width="26" height="26" rx="7" fill="#6366f1" opacity="0.15"/>
    <path d="M37 82v8a1.5 1.5 0 001.5 1.5h10a1.5 1.5 0 001.5-1.5v-6a1.5 1.5 0 00-1.5-1.5h-4.5l-1.5-1.5h-4A1.5 1.5 0 0037 82z" stroke="#818cf8" stroke-width="1.5" fill="none"/>
    <!-- Project label -->
    <text x="64" y="81" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#52525b" letter-spacing="1">PROJECT</text>
    <text x="64" y="97" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fafafa">my-saas-app</text>
    <!-- Switch button -->
    <text x="896" y="91" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#818cf8" text-anchor="end">Switch</text>

    <!-- Board header -->
    <text x="24" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#fafafa">Worktrees</text>
    <rect x="92" y="128" width="20" height="18" rx="6" fill="#ffffff" opacity="0.06"/>
    <text x="102" y="141" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#a1a1aa" text-anchor="middle">3</text>

    <!-- Add worktree button -->
    <rect x="838" y="124" width="106" height="32" rx="10" fill="url(#cta-d)" filter="url(#shadow-sm-d)"/>
