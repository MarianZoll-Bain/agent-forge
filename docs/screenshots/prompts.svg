    <text x="238" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#c4b5fd">CURSOR</text>
    <rect x="290" y="274" width="48" height="18" rx="9" fill="#6366f1" opacity="0.12"/>
    <text x="300" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#818cf8">GLOBAL</text>
    <text x="228" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e4e4e7">refactor-rules.md</text>
    <text x="228" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#52525b">Follow existing patterns. Prefer small, focused changes. No new deps...</text>
    <text x="708" y="287" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#818cf8">Edit</text>
    <text x="722" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#71717a">Move</text>
    <text x="716" y="324" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#ef4444">Delete</text>

    <!-- Prompt entry 3 -->
    <rect x="212" y="344" width="536" height="72" rx="12" fill="#ffffff" opacity="0.03"/>
    <rect x="212" y="344" width="536" height="72" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="228" y="358" width="52" height="18" rx="9" fill="#f97316" opacity="0.12"/>
    <text x="238" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#fdba74">CLAUDE</text>
    <rect x="288" y="358" width="48" height="18" rx="9" fill="#6366f1" opacity="0.12"/>
    <text x="298" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#818cf8">GLOBAL</text>
    <text x="228" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e4e4e7">testing-guide.md</text>
    <text x="228" y="406" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#52525b">Write unit tests using Vitest. Cover edge cases. Mock external deps...</text>
    <text x="708" y="371" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#818cf8">Edit</text>
    <text x="722" y="392" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#71717a">Move</text>
    <text x="716" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#ef4444">Delete</text>

    <!-- Prompt entry 4 -->
    <rect x="212" y="428" width="536" height="72" rx="12" fill="#ffffff" opacity="0.03"/>
    <rect x="212" y="428" width="536" height="72" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="228" y="442" width="54" height="18" rx="9" fill="#8b5cf6" opacity="0.12"/>
    <text x="238" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#c4b5fd">CURSOR</text>
    <rect x="290" y="442" width="54" height="18" rx="9" fill="#10b981" opacity="0.12"/>
    <text x="300" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#34d399">PROJECT</text>
    <text x="228" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e4e4e7">api-conventions.md</text>
    <text x="228" y="490" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#52525b">Use RESTful conventions. All endpoints return { ok, data } or { ok, error }...</text>
    <text x="708" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#818cf8">Edit</text>
    <text x="722" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#71717a">Move</text>
    <text x="716" y="492" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500" fill="#ef4444">Delete</text>
  </g>
</svg>
